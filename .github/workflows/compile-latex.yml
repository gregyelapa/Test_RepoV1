name: Compile LaTeX

on:
  push:
    branches:
      - main

# Grant write permissions to GitHub Actions
permissions:
  contents: write

jobs:
  compile:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Check out the repository
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # Step 2: Install full LaTeX distribution including pdflatex and biber
      - name: Install LaTeX
        run: |
          sudo apt-get update
          sudo apt-get install -y texlive-full biber

      # Step 3: Compile LaTeX with latexmk (handles all passes automatically)
      - name: Compile LaTeX
        run: |
          cd MyLatexProject
          latexmk -pdf -interaction=nonstopmode main.tex

      # Step 4: Upload PDF as downloadable artifact
      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: compiled-pdf
          path: MyLatexProject/main.pdf

      # Step 5: Commit compiled PDF back to repository
      - name: Commit PDF to repository
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add MyLatexProject/main.pdf
          git commit -m "Auto-compiled PDF from OneLatex" || echo "No changes to commit"
          git push
