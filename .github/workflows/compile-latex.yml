name: Compile LaTeX

on:
  push:
    branches:
      - main

jobs:
  compile:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Check out the repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Install biber with biblatex compatibility
      - name: Install biber
        run: |
          sudo apt-get update
          sudo apt-get install -y texlive-bibtex-extra

      # Step 3: Install Tectonic LaTeX engine
      - name: Setup Tectonic
        uses: wtfjoke/setup-tectonic@v3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # Step 4: Compile LaTeX from within project folder
      - name: Compile LaTeX
        run: |
          cd MyLatexProject
          tectonic -X compile main.tex --keep-logs

      # Step 5: Upload PDF as downloadable artifact
      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: compiled-pdf
          path: MyLatexProject/main.pdf

      # Step 6: Commit compiled PDF back to repository
      - name: Commit PDF to repository
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add MyLatexProject/main.pdf
          git commit -m "Auto-compiled PDF from OneLatex" || echo "No changes to commit"
          git push
