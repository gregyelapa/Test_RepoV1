name: Compile LaTeX Neue Version

on:
  push:
    branches:
      - main
    paths:
      - 'MyLatexProject2/**'
      - '.github/workflows/test2.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  compile:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Check out the repository
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # Step 2: Compile LaTeX using xu-cheng/latex-action (fast Docker-based)
      - name: Compile LaTeX Xualatex
        uses: xu-cheng/latex-action@v4
        with:
          root_file: main.tex
          working_directory: MyLatexProject2
          latexmk_use_lualatex: false
          latexmk_shell_escape: true

      # Step 3: Upload PDF as downloadable artifact
      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: compiled-pdf
          path: MyLatexProject2/main.pdf

      # Step 4: Commit compiled PDF back to repository
      - name: Commit PDF to repository
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add MyLatexProject2/main.pdf
          git commit -m "Auto-compiled PDF from OneLatex" || echo "No changes to commit"
          git push
